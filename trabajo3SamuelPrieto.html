<!DOCTYPE html>
<html lang="es">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadoraimc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
       <div class="container-lg bg-secondary-subtle p-2">

        <h1 class="text-center text-primary bg-primary-subtle p-2 m-2">Calculadora imc</h1>
    
    <form>      
        <!--peso-->
         <div class="mb-3 row p-4">
                <label for="peso" class="col-sm-4 col-form-label text-primary">Peso</label>
                <div class="col-sm-7">
                    <input type="number" class="form-control m-2 text-primary bg-primary-subtle" id="peso" value="">
                </div>
            </div>
        
         <!--altura-->
         <div class="mb-3 row p-4">
                <label for="altura" class="col-sm-4 col-form-label text-primary">Altura</label>
                <div class="col-sm-7">
                    <input type="number" class="form-control m-2 text-primary bg-primary-subtle" id="altura" value="">
                </div>
            </div>
        
         <!-- Botones -->
            <div class="mb-3 row p-4 justify-content-md-center">
                <button type="button" onclick="calcularimc()"     class="btn btn-success col-sm-1 m-1">calcular</button>
                <button type="reset" class="btn btn-danger col-sm-2 m-1">borrar</button>
            </div>

        <!-- resultado-->
            <div class="mb-3 row p-4">
                <label for="estado" class="col-sm-4 col-form-label text-primary">Estado</label>
                <div class="col-sm-7">
                    <input type="text" disabled readonly class="form-control m-2 text-primary bg-primary-subtle" id="estado" value="">
                </div>
            </div>

        <!--imc-->
             <div class="mb-3 row p-4">
                <label for="imc" class="col-sm-4 col-form-label text-primary">IMC</label>
                <div class="col-sm-7">
                    <input type="text" disabled readonly class="form-control m-2 text-primary bg-primary-subtle" id="imc" value="">
                </div>
            </div>

    </form>
    
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
    <script src="js/calculadoraimc.js"></script>
</body>
</html>
